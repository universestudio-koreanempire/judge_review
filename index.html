<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>순위 페이지</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f7f2ef;
      color: #333;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-section,
    .bottom-section {
      height: 50vh;
      width: 100%;
    }

    .top-section {
      background: #f3ece7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .top-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .bottom-section {
      padding: 28px 24px 36px;
      background: linear-gradient(180deg, #fffaf7 0%, #f8f0eb 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .section-title {
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
      margin: 0 0 24px;
      color: #b56b7c;
    }

    .ranking-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: end;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .rank-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 22px 18px;
      box-shadow: 0 10px 24px rgba(181, 107, 124, 0.12);
      border: 1px solid #f2d9df;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 280px;
    }

    .rank-card.first { min-height: 330px; }
    .rank-card.second,
    .rank-card.third { min-height: 290px; }

    .medal {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: #fff;
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.35), 0 8px 16px rgba(0,0,0,0.08);
    }

    .first .medal {
      background: linear-gradient(135deg, #f7d774, #d9a625);
      color: #7a5400;
    }

    .second .medal {
      background: linear-gradient(135deg, #dfe5ec, #aeb8c5);
      color: #53606f;
    }

    .third .medal {
      background: linear-gradient(135deg, #e8b38f, #b87333);
      color: #6f3f14;
    }

    .rank-label {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 14px;
      color: #5e4950;
    }

    .db-box {
      width: 100%;
      background: #fff8fb;
      border: 2px dashed #e6bac7;
      border-radius: 18px;
      padding: 14px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .db-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #b56b7c;
    }

    .db-field {
      background: #ffffff;
      border: 1px solid #ecd5dc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: #666;
      min-height: 42px;
      display: flex;
      align-items: center;
    }

    .example-note {
      text-align: center;
      margin-top: 18px;
      font-size: 0.92rem;
      color: #8b7580;
    }

    @media (max-width: 900px) {
      .top-section,
      .bottom-section {
        height: auto;
      }

      .top-section {
        min-height: 42vh;
      }

      .bottom-section {
        min-height: 58vh;
      }

      .ranking-board {
        grid-template-columns: 1fr;
      }

      .rank-card,
      .rank-card.first,
      .rank-card.second,
      .rank-card.third {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="top-section">
      <img src="https://raw.githubusercontent.com/universestudio-koreanempire/testplain/main/flower-letter.jpg" alt="꽃 편지지 이미지" />
    </section>

    <section class="bottom-section">
      <h1 class="section-title">TOP 3 순위</h1>

      <div class="ranking-board">
        <div class="rank-card second">
          <div class="medal">2</div>
          <div class="rank-label">2등</div>
          <div class="db-box">
            <div class="db-title">DB 데이터 표시 칸</div>
            <div class="db-field" id="second-name">이름</div>
            <div class="db-field" id="second-score">점수 / 정보</div>
          </div>
        </div>

        <div class="rank-card first">
          <div class="medal">1</div>
          <div class="rank-label">1등</div>
          <div class="db-box">
            <div class="db-title">DB 데이터 표시 칸</div>
            <div class="db-field" id="first-name">이름</div>
            <div class="db-field" id="first-score">점수 / 정보</div>
          </div>
        </div>

        <div class="rank-card third">
          <div class="medal">3</div>
          <div class="rank-label">3등</div>
          <div class="db-box">
            <div class="db-title">DB 데이터 표시 칸</div>
            <div class="db-field" id="third-name">이름</div>
            <div class="db-field" id="third-score">점수 / 정보</div>
          </div>
        </div>
      </div>

      <div class="example-note">
        나중에 JavaScript나 서버 템플릿으로 각 id 위치에 DB 값을 연결하면 됩니다.
      </div>
    </section>
  </div>
</body>
</html>
