<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>순위 페이지</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#f7f2ef; }
    .top { height:50vh; display:flex; justify-content:center; align-items:center; }
    .top img { width:100%; height:100%; object-fit:cover; }
    .bottom { height:50vh; display:flex; justify-content:center; align-items:center; }
    .board { display:flex; gap:20px; }
    .card { background:white; padding:20px; border-radius:15px; width:200px; text-align:center; }
    .first { transform:scale(1.1); }
  </style>
</head>
<body>
  <div class="top">
    <img src="/static/flower-letter.jpg">
  </div>

  <div class="bottom">
    <div class="board">

      <div class="card">
        <h2>2등</h2>
        <div>{{ second.name }}</div>
        <div>{{ second.info }}</div>
      </div>

      <div class="card first">
        <h2>1등</h2>
        <div>{{ first.name }}</div>
        <div>{{ first.info }}</div>
      </div>

      <div class="card">
        <h2>3등</h2>
        <div>{{ third.name }}</div>
        <div>{{ third.info }}</div>
      </div>

    </div>
  </div>
</body>
</html>
